<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Creami Recipes</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');

        :root {
            /* ElevenLabs-inspired light theme */
            --bg: #fdfcfc;
            --surface: #ffffff;
            --surface-2: #f5f3f1;
            --surface-3: #e5e5e5;
            --border: rgba(0,0,0,0.08);
            --border-hover: rgba(0,0,0,0.15);
            --text: #000000;
            --text-secondary: #777169;
            --text-tertiary: #a59f97;

            --accent: #E45512;
            --accent-2: #F58633;
            --accent-glow: rgba(228,85,18,0.10);

            --gradient: linear-gradient(135deg, var(--accent), var(--accent-2));
            --sidebar-width: 320px;

            /* Motion tokens from ElevenLabs extraction */
            --duration-xs: 150ms;
            --duration-sm: 200ms;
            --duration-md: 300ms;
            --ease-out: cubic-bezier(0.31, 0.325, 0, 0.92);

            /* Shadows from ElevenLabs extraction */
            --shadow-card: rgba(0,0,0,0.06) 0px 0px 0px 1px, rgba(0,0,0,0.04) 0px 1px 2px 0px, rgba(0,0,0,0.04) 0px 2px 4px 0px;
            --shadow-elevated: rgba(78,50,23,0.04) 0px 6px 16px 0px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg);
            color: var(--text);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Sidebar */
        .sidebar {
            width: var(--sidebar-width);
            background: var(--surface);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
        }

        .sidebar-header {
            padding: 24px 20px;
            border-bottom: 1px solid var(--border);
        }

        .sidebar-header h2 {
            font-size: 1.25rem;
            font-weight: 700;
            background: var(--gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -0.02em;
        }

        .sidebar-header p {
            font-size: 0.75rem;
            color: var(--text-tertiary);
            margin-top: 4px;
            font-weight: 400;
        }

        .search-box {
            padding: 12px 16px;
            border-bottom: 1px solid var(--border);
        }

        .search-box input {
            width: 100%;
            padding: 10px 14px;
            background: var(--surface-2);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            font-size: 0.85rem;
            font-family: inherit;
            outline: none;
            transition: border-color 0.2s;
        }

        .search-box input::placeholder { color: var(--text-tertiary); }
        .search-box input:focus { border-color: var(--accent); }

        .recipe-list {
            list-style: none;
            overflow-y: auto;
            flex: 1;
            scrollbar-width: thin;
            scrollbar-color: var(--surface-3) var(--surface);
        }

        .recipe-group-title {
            padding: 12px 20px 8px;
            font-size: 0.7rem;
            font-weight: 600;
            color: var(--text-tertiary);
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }

        .recipe-item {
            padding: 10px 20px;
            cursor: pointer;
            font-size: 0.88rem;
            color: var(--text-secondary);
            transition: all 0.15s;
            border-left: 3px solid transparent;
            font-weight: 400;
        }

        .recipe-item:hover {
            background: var(--surface-2);
            color: var(--text);
        }

        .recipe-item.active {
            background: var(--accent-glow);
            color: var(--text);
            border-left-color: var(--accent);
            font-weight: 500;
        }

        .hidden { display: none !important; }

        .sidebar-footer {
            padding: 16px;
            border-top: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .sidebar-footer button {
            width: 100%;
            padding: 10px;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: var(--surface-2);
            color: var(--text-secondary);
            font-size: 0.82rem;
            font-family: inherit;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.15s;
        }

        .sidebar-footer button:hover {
            background: var(--surface-3);
            color: var(--text);
            border-color: var(--border-hover);
        }

        /* Main */
        .main {
            flex: 1;
            padding: 40px;
            overflow-y: auto;
            display: flex;
            justify-content: center;
        }

        .container {
            max-width: 780px;
            width: 100%;
            height: fit-content;
        }

        .recipe-title {
            font-size: 2rem;
            font-weight: 800;
            letter-spacing: -0.03em;
            line-height: 1.2;
            margin-bottom: 8px;
        }

        .recipe-desc {
            font-size: 1rem;
            color: var(--text-secondary);
            margin-bottom: 28px;
            font-weight: 300;
            line-height: 1.6;
        }

        .recipe-meta {
            display: inline-block;
            padding: 4px 12px;
            background: var(--accent-glow);
            border: 1px solid var(--border);
            border-radius: 9999px;
            font-size: 0.75rem;
            font-weight: 500;
            color: var(--accent);
            margin-bottom: 24px;
        }

        /* Size toggle */
        .size-toggle {
            display: inline-flex;
            background: var(--surface-2);
            border: 1px solid var(--border);
            border-radius: 8px;
            overflow: hidden;
            margin-left: 12px;
            vertical-align: middle;
        }

        .size-toggle button {
            padding: 4px 14px;
            background: none;
            border: none;
            color: var(--text-tertiary);
            font-size: 0.75rem;
            font-family: inherit;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.15s;
        }

        .size-toggle button.active {
            background: var(--accent);
            color: white;
        }

        .size-toggle button:hover:not(.active) {
            color: var(--text);
        }

        /* Video */
        .video-wrapper {
            position: relative;
            padding-bottom: 56.25%;
            height: 0;
            border-radius: 12px;
            overflow: hidden;
            background: var(--surface-2);
            margin-bottom: 8px;
        }

        .video-wrapper iframe {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            border: none;
        }

        .video-fallback {
            text-align: center;
            margin-bottom: 32px;
        }

        .video-fallback a {
            color: var(--text-tertiary);
            font-size: 0.8rem;
            text-decoration: none;
            transition: color 0.15s;
        }

        .video-fallback a:hover { color: var(--accent-2); }

        /* Thumbnail */
        .thumbnail-link {
            display: block;
            position: relative;
            border-radius: 12px;
            overflow: hidden;
            margin-bottom: 8px;
        }

        .thumbnail-link img {
            width: 100%;
            display: block;
            border-radius: 12px;
            transition: transform 0.3s, filter 0.3s;
        }

        .thumbnail-link:hover img {
            transform: scale(1.02);
            filter: brightness(0.85);
        }

        .thumbnail-link .play-overlay {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .thumbnail-link:hover .play-overlay {
            opacity: 1;
        }

        .thumbnail-link .play-btn {
            width: 64px;
            height: 64px;
            background: rgba(0,0,0,0.75);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .thumbnail-link .play-btn svg {
            width: 24px;
            height: 24px;
            fill: #ffffff;
            margin-left: 3px;
        }

        /* Sections */
        .section {
            margin-top: 32px;
        }

        .section-title {
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--text-tertiary);
            margin-bottom: 16px;
            padding-bottom: 8px;
            border-bottom: 1px solid var(--border);
        }

        /* Ingredients */
        .ingredient-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .ingredient-list li {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 12px;
            border-radius: 8px;
            transition: background 0.1s;
            font-size: 0.9rem;
        }

        .ingredient-list li:hover { background: var(--surface-2); }

        .ingredient-list input[type="checkbox"] {
            appearance: none;
            width: 18px;
            height: 18px;
            border: 1.5px solid var(--text-tertiary);
            border-radius: 4px;
            cursor: pointer;
            flex-shrink: 0;
            transition: all 0.15s;
            position: relative;
        }

        .ingredient-list input[type="checkbox"]:checked {
            background: var(--accent);
            border-color: var(--accent);
        }

        .ingredient-list input[type="checkbox"]:checked::after {
            content: '';
            position: absolute;
            left: 5px; top: 2px;
            width: 5px; height: 9px;
            border: solid white;
            border-width: 0 2px 2px 0;
            transform: rotate(45deg);
        }

        .ingredient-list input[type="checkbox"]:checked + span {
            text-decoration: line-through;
            color: var(--text-tertiary);
        }

        /* Steps */
        .steps-list {
            list-style: none;
            counter-reset: step;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .steps-list li {
            counter-increment: step;
            display: flex;
            align-items: flex-start;
            gap: 16px;
            padding: 14px 12px;
            border-radius: 8px;
            transition: background 0.1s;
            font-size: 0.9rem;
            line-height: 1.6;
            color: var(--text-secondary);
        }

        .steps-list li:hover { background: var(--surface-2); }

        .steps-list li::before {
            content: counter(step);
            min-width: 28px;
            height: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--surface-3);
            border-radius: 6px;
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--text-tertiary);
            flex-shrink: 0;
            margin-top: 1px;
        }

        /* Notes */
        .notes-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .notes-list li {
            padding: 12px 16px;
            background: var(--surface-2);
            border-radius: 8px;
            font-size: 0.85rem;
            color: var(--text-secondary);
            line-height: 1.5;
            border-left: 3px solid var(--accent);
        }

        /* Tips page */
        .tip-card {
            padding: 20px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            margin-bottom: 12px;
            font-size: 0.9rem;
            line-height: 1.6;
            color: var(--text-secondary);
        }

        .tip-card strong {
            color: var(--text);
        }

        /* Hero / Welcome */
        .hero {
            text-align: center;
            padding: 48px 0 24px;
        }

        .hero h1 {
            font-size: 2.4rem;
            font-weight: 800;
            letter-spacing: -0.04em;
            background: var(--gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 8px;
        }

        .hero p {
            font-size: 0.95rem;
            color: var(--text-secondary);
            line-height: 1.6;
            font-weight: 300;
            margin-bottom: 32px;
        }

        /* Recipe Cards */
        .card-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
        }

        .recipe-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            overflow: hidden;
            cursor: pointer;
            box-shadow: var(--shadow-card);
            transition: box-shadow var(--duration-sm) var(--ease-out), transform var(--duration-sm) var(--ease-out);
        }

        .recipe-card:hover {
            box-shadow: var(--shadow-elevated);
            transform: translateY(-2px);
        }

        .recipe-card img {
            width: 100%;
            height: 160px;
            object-fit: cover;
        }

        .recipe-card-body {
            padding: 14px 16px;
        }

        .recipe-card-title {
            font-size: 0.9rem;
            font-weight: 600;
            margin-bottom: 4px;
            line-height: 1.3;
        }

        .recipe-card-type {
            font-size: 0.7rem;
            color: var(--accent-2);
            font-weight: 500;
            margin-bottom: 8px;
        }

        .recipe-card-macros {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }

        .macro-pill {
            font-size: 0.68rem;
            padding: 3px 8px;
            border-radius: 4px;
            background: var(--surface-2);
            color: var(--text-secondary);
            font-weight: 500;
        }

        .macro-pill.cal {
            background: var(--accent-glow);
            color: var(--accent-2);
        }

        /* Macro bar on recipe detail */
        .macro-bar {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            align-items: center;
            margin-bottom: 24px;
        }

        .macro-bar .macro-pill {
            font-size: 0.78rem;
            padding: 5px 10px;
        }

        .macro-variant-toggle {
            display: inline-flex;
            background: var(--surface-2);
            border: 1px solid var(--border);
            border-radius: 6px;
            overflow: hidden;
            margin-right: 8px;
        }

        .macro-variant-toggle button {
            padding: 5px 12px;
            background: none;
            border: none;
            color: var(--text-tertiary);
            font-size: 0.72rem;
            font-family: inherit;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.15s;
        }

        .macro-variant-toggle button.active {
            background: var(--accent);
            color: white;
        }

        .macro-variant-toggle button:hover:not(.active) {
            color: var(--text);
        }

        @media (max-width: 768px) {
            .card-grid { grid-template-columns: 1fr; }
        }

        /* Shopping list */
        .shopping-category {
            margin-top: 24px;
        }

        .shopping-category-title {
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--accent-2);
            padding: 8px 12px;
            background: var(--accent-glow);
            border-radius: 8px;
            margin-bottom: 8px;
        }

        /* Theme Picker */
        .theme-picker {
            position: fixed;
            top: 16px;
            right: 16px;
            z-index: 100;
        }

        .theme-picker-btn {
            width: 40px;
            height: 40px;
            border-radius: 9999px;
            border: 1px solid var(--border);
            background: var(--surface);
            box-shadow: var(--shadow-card);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: box-shadow var(--duration-sm) var(--ease-out);
        }

        .theme-picker-btn:hover {
            box-shadow: var(--shadow-elevated);
        }

        .theme-picker-btn svg {
            width: 18px;
            height: 18px;
            stroke: var(--text-secondary);
            fill: none;
            stroke-width: 1.5;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .theme-dropdown {
            display: none;
            position: absolute;
            top: 48px;
            right: 0;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            box-shadow: var(--shadow-elevated);
            padding: 8px;
            min-width: 180px;
        }

        .theme-dropdown.open {
            display: block;
        }

        .theme-dropdown-title {
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--text-tertiary);
            padding: 4px 8px 8px;
        }

        .theme-option {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.85rem;
            color: var(--text-secondary);
            transition: background var(--duration-xs);
        }

        .theme-option:hover {
            background: var(--surface-2);
        }

        .theme-option.active {
            color: var(--text);
            font-weight: 500;
        }

        .theme-swatch {
            width: 20px;
            height: 20px;
            border-radius: 9999px;
            border: 2px solid var(--border);
            flex-shrink: 0;
        }

        .theme-option.active .theme-swatch {
            border-color: var(--text);
        }

        /* Mobile */
        @media (max-width: 768px) {
            body { flex-direction: column; }
            .sidebar {
                width: 100%;
                height: 45vh;
                border-right: none;
                border-bottom: 1px solid var(--border);
            }
            .main { padding: 20px; }
            .recipe-title { font-size: 1.5rem; }
            .hero h1 { font-size: 2rem; }
        }
    </style>
</head>
<body>

<div class="theme-picker">
    <button class="theme-picker-btn" onclick="toggleThemeMenu()" aria-label="Change theme">
        <svg viewBox="0 0 24 24"><path d="M12 2C6.5 2 2 6.5 2 12s4.5 10 10 10c.9 0 1.7-.1 2.5-.3C11.2 20.4 9 17.5 9 14c0-4.4 3.6-8 8-8 1 0 2 .2 2.9.5C18.8 3.7 15.7 2 12 2z"/><circle cx="7.5" cy="10.5" r="1.5"/><circle cx="12" cy="7.5" r="1.5"/><circle cx="16.5" cy="10.5" r="1.5"/><circle cx="9" cy="15" r="1.5"/></svg>
    </button>
    <div class="theme-dropdown" id="themeDropdown">
        <div class="theme-dropdown-title">Theme</div>
        <div id="themeOptions"></div>
    </div>
</div>

<div class="sidebar">
    <div class="sidebar-header" style="cursor:pointer;" onclick="showHome()">
        <h2>Creami Recipes</h2>
        <p>Ninja Creami cookbook</p>
    </div>
    <div class="search-box">
        <input type="text" id="recipeSearch" placeholder="Search recipes..." onkeyup="filterRecipes()">
    </div>
    <ul class="recipe-list" id="recipeList"></ul>
    <div class="sidebar-footer">
        <button onclick="showTips()">Tips & Tricks</button>
    </div>
</div>

<div class="main">
    <div class="container" id="contentArea">
        <div class="hero">
            <h1>Creami Recipes</h1>
            <p>A collection of Ninja Creami recipes extracted from YouTube videos using yt-dlp and fabric-ai.</p>
        </div>
    </div>
</div>

<script>
// --- THEME SYSTEM ---
const THEMES = [
    { name: 'Mango',      accent: '#E45512', accent2: '#F58633', glow: 'rgba(228,85,18,0.10)' },
    { name: 'Mint',        accent: '#1FAD9D', accent2: '#37C8B5', glow: 'rgba(31,173,157,0.10)' },
    { name: 'Blueberry',   accent: '#4056CE', accent2: '#7294E3', glow: 'rgba(64,86,206,0.10)' },
    { name: 'Strawberry',  accent: '#D7332B', accent2: '#F57A74', glow: 'rgba(215,51,43,0.10)' },
    { name: 'Grape',       accent: '#9139B7', accent2: '#CF94EC', glow: 'rgba(145,57,183,0.10)' },
    { name: 'Pistachio',   accent: '#059661', accent2: '#2DD28D', glow: 'rgba(5,150,97,0.10)' },
];

let currentTheme = localStorage.getItem('creami-theme') || THEMES[0]?.name || '';

function applyTheme(themeName) {
    const theme = THEMES.find(t => t.name === themeName);
    if (!theme) return;
    const root = document.documentElement.style;
    root.setProperty('--accent', theme.accent);
    root.setProperty('--accent-2', theme.accent2);
    root.setProperty('--accent-glow', theme.glow);
    currentTheme = theme.name;
    localStorage.setItem('creami-theme', theme.name);
    renderThemeOptions();
}

function renderThemeOptions() {
    const container = document.getElementById('themeOptions');
    container.innerHTML = THEMES.map(t => `
        <div class="theme-option ${t.name === currentTheme ? 'active' : ''}" onclick="applyTheme('${t.name}')">
            <div class="theme-swatch" style="background:${t.accent}"></div>
            ${t.name}
        </div>
    `).join('');
}

function toggleThemeMenu() {
    document.getElementById('themeDropdown').classList.toggle('open');
}

document.addEventListener('click', (e) => {
    if (!e.target.closest('.theme-picker')) {
        document.getElementById('themeDropdown').classList.remove('open');
    }
});

document.addEventListener('DOMContentLoaded', () => {
    renderThemeOptions();
    if (currentTheme) applyTheme(currentTheme);
});

// --- RECIPE DATA ---
let db = [];

const tips = [
    { title: "The Hump Fix", body: "If your pint has a frozen hump in the middle, let the liquid settle for 10\u201315 minutes before freezing, or freeze with the lid off for the first hour." },
    { title: "Icy Walls", body: "Run the pint under hot water for exactly 60 seconds before spinning to prevent icy edges." },
    { title: "Xanthan Gum", body: "Prevents ice crystals and improves texture. Don't skip it, especially with almond milk bases. Sprinkle in while whisking to avoid clumps." },
    { title: "Immersion Blender", body: "Use an immersion blender instead of a frother. Frothers introduce too much air and create foam." },
    { title: "Salt", body: "A small amount of salt enhances sweetness and flavor perception, which is especially important in frozen foods where taste buds are dulled." },
    { title: "Freeze Time", body: "24 hours is the standard. If you heated the base (e.g. melting chocolate or tempering eggs), freeze for 36 hours instead." },
    { title: "Re-spinning", body: "If the result is crumbly or icy after the first spin, re-process on the same setting. Scrape down the sides before the second run." }
];

// --- SCALING ---
// Standard pint = 16 oz, Deluxe pint = 24 oz → 1.5x
const SCALE_FACTOR = 1.5;
let currentSize = 'standard';
let currentRecipe = null;
let currentMacroVariant = 0;

const FRACTION_MAP = {
    '\u00bc': 0.25, '\u00bd': 0.5, '\u00be': 0.75,
    '\u2153': 1/3, '\u2154': 2/3, '\u2155': 0.2, '\u2156': 0.4,
    '\u2157': 0.6, '\u2158': 0.8, '\u2159': 1/6, '\u215a': 5/6,
    '\u215b': 0.125, '\u215c': 0.375, '\u215d': 0.625, '\u215e': 0.875
};

function toFraction(val) {
    const fracs = [
        [0.125, '\u215b'], [0.2, '\u2155'], [0.25, '\u00bc'],
        [1/3, '\u2153'], [0.375, '\u215c'], [0.4, '\u2156'],
        [0.5, '\u00bd'], [0.6, '\u2157'], [0.625, '\u215d'],
        [2/3, '\u2154'], [0.75, '\u00be'], [0.8, '\u2158'],
        [0.875, '\u215e'], [5/6, '\u215a']
    ];
    const whole = Math.floor(val);
    const remainder = val - whole;
    if (remainder < 0.05) return whole === 0 ? '0' : String(whole);
    const closest = fracs.reduce((best, [f, ch]) =>
        Math.abs(f - remainder) < Math.abs(best[0] - remainder) ? [f, ch] : best
    );
    if (Math.abs(closest[0] - remainder) < 0.05) {
        return whole > 0 ? `${whole}${closest[1]}` : closest[1];
    }
    return val % 1 === 0 ? String(val) : val.toFixed(1).replace(/\.0$/, '');
}

function scaleText(text, factor) {
    if (factor === 1) return text;
    // Match patterns like: 400g, 10-15g, 1½, 40–45g, 11.5 fl oz
    return text.replace(/(\d+\.?\d*)\s*[\u2013-]\s*(\d+\.?\d*)(g|ml|oz)\b/g, (m, lo, hi, unit) => {
        const sLo = parseFloat(lo) * factor;
        const sHi = parseFloat(hi) * factor;
        const fLo = sLo % 1 === 0 ? String(sLo) : sLo.toFixed(1).replace(/\.0$/, '');
        const fHi = sHi % 1 === 0 ? String(sHi) : sHi.toFixed(1).replace(/\.0$/, '');
        return `${fLo}\u2013${fHi}${unit}`;
    }).replace(/(\d+\.?\d*)(g|ml|oz)\b/g, (m, num, unit) => {
        const scaled = parseFloat(num) * factor;
        const fmt = scaled % 1 === 0 ? String(scaled) : scaled.toFixed(1).replace(/\.0$/, '');
        return `${fmt}${unit}`;
    }).replace(/(\d*)([\u00bc\u00bd\u00be\u2153\u2154\u2155\u2156\u2157\u2158\u2159\u215a\u215b\u215c\u215d\u215e])/g, (m, whole, frac) => {
        const val = (whole ? parseInt(whole) : 0) + FRACTION_MAP[frac];
        return toFraction(val * factor);
    }).replace(/\((\d+\.?\d*)\s+(cups?|tbsp|tsp|fl oz|scoops?|bottles?)\)/g, (m, num, unit) => {
        const scaled = parseFloat(num) * factor;
        const fmt = scaled % 1 === 0 ? String(scaled) : scaled.toFixed(1).replace(/\.0$/, '');
        return `(${fmt} ${unit})`;
    }).replace(/\(about\s+(\d+\.?\d*)\s+(cups?|tbsp|tsp|fl oz|scoops?)\)/g, (m, num, unit) => {
        const scaled = parseFloat(num) * factor;
        const fmt = scaled % 1 === 0 ? String(scaled) : scaled.toFixed(1).replace(/\.0$/, '');
        return `(about ${fmt} ${unit})`;
    });
}

function setSize(size) {
    currentSize = size;
    if (currentRecipe) loadRecipe(currentRecipe[0], currentRecipe[1]);
}

function setMacroVariant(idx) {
    currentMacroVariant = idx;
    if (currentRecipe) loadRecipe(currentRecipe[0], currentRecipe[1]);
}

// --- APP LOGIC ---
const recipeListEl = document.getElementById('recipeList');
const contentAreaEl = document.getElementById('contentArea');

function renderSidebar() {
    recipeListEl.innerHTML = '';
    db.forEach((group, gi) => {
        const title = document.createElement('li');
        title.className = 'recipe-group-title';
        title.innerText = group.category;
        recipeListEl.appendChild(title);

        group.recipes.forEach((recipe, ri) => {
            const li = document.createElement('li');
            li.className = 'recipe-item';
            li.innerText = recipe.title;
            li.onclick = () => loadRecipe(gi, ri);
            li.dataset.g = gi;
            li.dataset.r = ri;
            li.dataset.search = (recipe.title + ' ' + recipe.ingredients.join(' ')).toLowerCase();
            recipeListEl.appendChild(li);
        });
    });
}

function filterRecipes() {
    const q = document.getElementById('recipeSearch').value.toLowerCase();
    document.querySelectorAll('.recipe-item').forEach(item => {
        item.classList.toggle('hidden', !item.dataset.search.includes(q));
    });
    document.querySelectorAll('.recipe-group-title').forEach(title => {
        let next = title.nextElementSibling;
        let visible = false;
        while (next && !next.classList.contains('recipe-group-title')) {
            if (!next.classList.contains('hidden')) visible = true;
            next = next.nextElementSibling;
        }
        title.style.display = visible ? '' : 'none';
    });
}

function loadRecipe(gi, ri) {
    if (!currentRecipe || currentRecipe[0] !== gi || currentRecipe[1] !== ri) {
        currentMacroVariant = 0;
    }
    currentRecipe = [gi, ri];
    const r = db[gi].recipes[ri];
    const factor = currentSize === 'deluxe' ? SCALE_FACTOR : 1;

    document.querySelectorAll('.recipe-item').forEach(el => el.classList.remove('active'));
    const active = document.querySelector(`.recipe-item[data-g="${gi}"][data-r="${ri}"]`);
    if (active) active.classList.add('active');
    document.querySelector('.main').scrollTop = 0;

    let videoHTML = '';
    if (r.videoId) {
        const ytThumb = `https://img.youtube.com/vi/${r.videoId}/maxresdefault.jpg`;
        videoHTML = `
            <a class="thumbnail-link" href="https://www.youtube.com/watch?v=${r.videoId}" target="_blank">
                <img src="${ytThumb}" alt="${r.title}">
                <div class="play-overlay"><div class="play-btn"><svg viewBox="0 0 24 24"><polygon points="6,3 20,12 6,21"/></svg></div></div>
            </a>
            <div class="video-fallback"><a href="https://www.youtube.com/watch?v=${r.videoId}" target="_blank">Open in YouTube</a></div>
        `;
    } else if (r.tiktok) {
        const thumbSrc = r.thumbnail || '';
        videoHTML = thumbSrc ? `
            <a class="thumbnail-link" href="${r.tiktok}" target="_blank">
                <img src="${thumbSrc}" alt="${r.title}">
                <div class="play-overlay"><div class="play-btn"><svg viewBox="0 0 24 24"><polygon points="6,3 20,12 6,21"/></svg></div></div>
            </a>
            <div class="video-fallback"><a href="${r.tiktok}" target="_blank">Watch on TikTok</a></div>
        ` : `<div class="video-fallback" style="margin-bottom:32px;"><a href="${r.tiktok}" target="_blank">Watch on TikTok</a></div>`;
    }

    let notesHTML = '';
    if (r.notes && r.notes.length) {
        notesHTML = `
            <div class="section">
                <div class="section-title">Notes</div>
                <ul class="notes-list">
                    ${r.notes.map(n => `<li>${n}</li>`).join('')}
                </ul>
            </div>
        `;
    }

    const stdClass = currentSize === 'standard' ? 'active' : '';
    const dlxClass = currentSize === 'deluxe' ? 'active' : '';

    // Macro variants
    const macrosList = Array.isArray(r.macros) ? r.macros : (r.macros && r.macros.calories != null ? [r.macros] : []);
    let macroBarHTML = '';
    if (macrosList.length > 0) {
        const selectedIdx = typeof currentMacroVariant === 'number' && currentMacroVariant < macrosList.length ? currentMacroVariant : 0;
        const sm = macrosList[selectedIdx];

        let toggleHTML = '';
        if (macrosList.length > 1) {
            toggleHTML = `<div class="macro-variant-toggle">${macrosList.map((v, i) =>
                `<button class="${i === selectedIdx ? 'active' : ''}" onclick="setMacroVariant(${i})">${v.label}</button>`
            ).join('')}</div>`;
        }

        const scaleMacro = v => v != null ? Math.round(v * factor) : null;
        const detailPills = [
            sm.calories != null ? `<span class="macro-pill cal">${scaleMacro(sm.calories)} cal</span>` : '',
            sm.protein != null ? `<span class="macro-pill">${scaleMacro(sm.protein)}g protein</span>` : '',
            sm.fat != null ? `<span class="macro-pill">${scaleMacro(sm.fat)}g fat</span>` : '',
            sm.carbs != null ? `<span class="macro-pill">${scaleMacro(sm.carbs)}g carbs</span>` : '',
            sm.sugar != null ? `<span class="macro-pill">${scaleMacro(sm.sugar)}g sugar</span>` : ''
        ].filter(Boolean).join('');

        macroBarHTML = `<div class="macro-bar">${toggleHTML}${detailPills}</div>`;
    }

    contentAreaEl.innerHTML = `
        <span class="recipe-meta">${r.baseType}</span>
        <div class="size-toggle">
            <button class="${stdClass}" onclick="setSize('standard')">Standard (16 oz)</button>
            <button class="${dlxClass}" onclick="setSize('deluxe')">Deluxe (24 oz)</button>
        </div>
        <h1 class="recipe-title">${r.title}</h1>
        <p class="recipe-desc">${r.desc}</p>
        ${macroBarHTML}
        ${videoHTML}

        <div class="section">
            <div class="section-title">Ingredients</div>
            <ul class="ingredient-list">
                ${r.ingredients.map(i => `<li><input type="checkbox"><span>${scaleText(i, factor)}</span></li>`).join('')}
            </ul>
        </div>

        <div class="section">
            <div class="section-title">Steps</div>
            <ol class="steps-list">
                ${r.steps.map(s => `<li><span>${scaleText(s, factor)}</span></li>`).join('')}
            </ol>
        </div>

        ${notesHTML}
    `;
}

function showHome() {
    currentRecipe = null;
    document.querySelectorAll('.recipe-item').forEach(el => el.classList.remove('active'));
    document.querySelector('.main').scrollTop = 0;

    let cardsHTML = '';
    db.forEach((group, gi) => {
        group.recipes.forEach((r, ri) => {
            const thumbSrc = r.thumbnail || (r.videoId ? `https://img.youtube.com/vi/${r.videoId}/mqdefault.jpg` : '');
            const imgHTML = thumbSrc ? `<img src="${thumbSrc}" alt="${r.title}">` : '';
            const macrosList = Array.isArray(r.macros) ? r.macros : (r.macros && r.macros.calories != null ? [r.macros] : []);
            const m = macrosList[0] || {};
            const pills = [
                m.calories != null ? `<span class="macro-pill cal">${m.calories} cal</span>` : '',
                m.protein != null ? `<span class="macro-pill">${m.protein}g protein</span>` : '',
                m.fat != null ? `<span class="macro-pill">${m.fat}g fat</span>` : '',
                m.carbs != null ? `<span class="macro-pill">${m.carbs}g carbs</span>` : '',
                m.sugar != null ? `<span class="macro-pill">${m.sugar}g sugar</span>` : ''
            ].filter(Boolean).join('');
            const macrosHTML = pills ? `<div class="recipe-card-macros">${pills}</div>` : '';

            cardsHTML += `
                <div class="recipe-card" onclick="loadRecipe(${gi}, ${ri})">
                    ${imgHTML}
                    <div class="recipe-card-body">
                        <div class="recipe-card-title">${r.title}</div>
                        <div class="recipe-card-type">${r.baseType}</div>
                        ${macrosHTML}
                    </div>
                </div>
            `;
        });
    });

    contentAreaEl.innerHTML = `
        <div class="hero">
            <h1>Creami Recipes</h1>
            <p>A collection of Ninja Creami recipes extracted from YouTube and TikTok videos.</p>
        </div>
        <div class="card-grid">${cardsHTML}</div>
    `;
}

function showTips() {
    document.querySelectorAll('.recipe-item').forEach(el => el.classList.remove('active'));
    document.querySelector('.main').scrollTop = 0;

    contentAreaEl.innerHTML = `
        <h1 class="recipe-title">Tips & Tricks</h1>
        <p class="recipe-desc">Essential techniques for better Creami results.</p>
        <div style="margin-top: 24px;">
            ${tips.map(t => `<div class="tip-card"><strong>${t.title}:</strong> ${t.body}</div>`).join('')}
        </div>
    `;
}

fetch('recipes.json')
    .then(res => res.json())
    .then(data => { db = data; renderSidebar(); showHome(); })
    .catch(err => {
        contentAreaEl.innerHTML = `<div class="hero"><h1 class="recipe-title">Failed to load recipes</h1><p class="recipe-desc">${err.message}</p></div>`;
    });
</script>

</body>
</html>
